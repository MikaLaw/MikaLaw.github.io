        <style type="text/css">
            html, body { margin: 0; padding: 0; height: 100%; font-family: Roboto}
            iframe{ position: absolute; left:0; right:0; bottom:0; top:0; border:0; }

            .wrapper {
                width: 100%;
                height: 100%;
                background: #BFC6CD;
                color: #ffffff;
                font-family: Roboto;
                overflow-x: hidden;
                display: flex;
                flex-direction: column;
            }
            .section {
                width: 100%;
                display: none;
                align-items: center;
                justify-content: center;
                padding: 7.6%;
                box-sizing: border-box;
            }
            #section__one,
            #section__four {
                align-items: center;
                justify-content: center;
                height: 100%;
            }
            .section.active {
                display: flex;
            }
            .question__title {
                font-size: 18px;
                line-height: 22px;
                margin-bottom: 8px;
            }
            .question__description {
                font-size: 16px;
                line-height: 26px;
                color: rgba(255, 255, 255, 0.7);
                margin-bottom: 30px;
            }
            .question__answer {
                margin-bottom: 22px;
            }
            .question__input {
                background: transparent;
                border: 1px solid transparent;
                border-bottom: 2px solid #ffffff;
                font-size: 24px;
                width: 100%;
                padding: 10px 0px;
                color: #ffffff;
            }
            .question__input::placeholder {
                color: rgba(255, 255, 255, 0.3);
                font-size: 24px;
                line-height: 24px;
            }
            .question__input:focus {
                outline: none;
            }
            .question__button {
                display: flex;
                align-items: center;
            }
            .question__btn {
                cursor: pointer;
                outline: none;
                border: 1px solid transparent;
                box-shadow: rgba(0, 0, 0, 0.1) 0px 3px 12px 0px;
                padding: 6px 14px;
                background-color: rgb(255, 255, 255);
                color: #808389;
                border-radius: 4px;
                font-weight: 700;
                font-size: 16px;
                line-height: 28px;
            }
            .question__btn_icon {
                width: 17px;
            }
            .question__load {
                display: none;
            }
            .question__load img{
                width: 25px;
                height: 25px;
                margin-left: 16px;
            }
            .question__list {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                padding: 0;
                list-style: none;
                margin: 0 -10px;
                margin-bottom: 30px;
            }
            .question__item.active .question__label{
                display: block;
            }
            .question__label {
                position: absolute;
                top: -9px;
                right: -37px;
                background: white;
                width: 110px;
                height: 50px;
                transform: rotate(45deg);
                display: none;
            }
            .question__label-icon {
                margin-top: 22px;
                transform: rotate(-45deg);
            }
            .question__label-icon img {
                width: 20px;
            }
            .question__item {
                width: 295px;
                padding: 10px;
                box-sizing: border-box;
            }
            .question__block {
                border: 1px solid #ffffff;
                text-align: center;
                padding: 8px 0;
                position: relative;
                overflow: hidden;
            }
            .question__pic {
                width: 150px;
                height: 150px;
                margin: 0 auto;
                margin-bottom: 14px;
                background-repeat: no-repeat;
                background-size: contain;
            }
            .question__img {
                display: block;
                opacity: 0;
            }
            .question__mark {
                width: 24px;
                height: 24px;
                line-height: 24px;
                font-size: 16px;
                border: 1px solid #FFFFFF;
                box-sizing: border-box;
                border-radius: 3px;
                margin: 0 auto;
            }
            .section__control {
                display: flex;
                justify-content: flex-end;
                padding: 24px;
                flex: 1;
                align-items: flex-end;
            }
            .section__control-btn {
                background-color: white;
                width: 38px;
                height: 38px;
                display: flex;
                justify-content: center;
                align-items: center;
                margin: 1px;
            }
            .section__control-btn:hover img{
                opacity: 0.2;
            }
            .section__control-btn_prev {
                border-radius: 0px 4px 4px 0px;
                transform: rotate(180deg);
            }
            .section__control-btn_next {
                border-radius: 0px 4px 4px 0px;
            }
            .section__control-btn img {
                display: block;
                width: 14px;
                transition: 0.3s;
            }
            input:-webkit-autofill,
            input:-webkit-autofill:hover,
            input:-webkit-autofill:focus
            input:-webkit-autofill,
            textarea:-webkit-autofill,
            textarea:-webkit-autofill:hover
            textarea:-webkit-autofill:focus,
            select:-webkit-autofill,
            select:-webkit-autofill:hover,
            select:-webkit-autofill:focus {
                color: white;
                -webkit-text-fill-color: #ссс;
                -webkit-box-shadow: 0 0 0px 1000px transparent inset;

            }

        function AjaxHelper(url, method, data, headers) {
                return new Promise((resolve, reject) => {
                    let ajax = new XMLHttpRequest();
                    ajax.open(method, url, true);
                    ajax.onreadystatechange = () => {
                        if (ajax.readyState !== 4) {return}
                        if (ajax.status === 404) {reject(ajax.statusText)}
                        else {resolve(ajax.response)}
                    };
                    for (let i = 0; i < headers.length; i++) {
                        ajax.setRequestHeader(headers[i][0], headers[i][1]);
                    }
                    if (data) { ajax.send(data) }
                    else { ajax.send() }
                });
        }
